<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天気予報アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script src="main.js" defer></script>
</head>
<body>
  <main class="wrapper">
    <h1>天気予報アプリ</h1>

    <div id="input">
      <input id="city" type="text" placeholder="都市名 (例: Tokyo)">
      <input id="btn" type="button" value="取得">
    </div>

    <div id="output">
      <h2>結果</h2>
      <p id="result"></p>
    </div>
  </main>

  <footer>
    <small>&copy;Weather app 2026</small>
  </footer>

</body>
</html>
